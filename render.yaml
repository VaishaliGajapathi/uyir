services:
  - type: web
    name: uyir-server
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm run db:migrate && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FAL_KEY
        sync: false
      - key: MSG91_AUTH_KEY
        sync: false
      - key: MSG91_OTP_TEMPLATE_ID
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: ALLOW_MOCK_DOCUMENTS
        value: "false"
    healthCheckPath: /api/health
