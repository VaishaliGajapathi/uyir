services:
  - type: web
    name: uyir-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build && cd ../client && npm install && npm run build && rm -rf ../server/public && mkdir -p ../server/public && cp -r dist/* ../server/public/
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: uyir-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      # OTP verification (required for signup/login OTP)
      - key: MSG91_AUTH_KEY
        sync: false
      # fal.ai - sole AI provider for STT, voice parsing, request authenticity,
      # and document verification (text + vision via OpenRouter)
      - key: FAL_KEY
        sync: false
      # Web push notifications (optional; push disabled if unset)
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      # Firebase Cloud Messaging for mobile push (optional)
      - key: FIREBASE_SERVICE_ACCOUNT_BASE64
        sync: false

databases:
  - name: uyir-db
    plan: free
