    <div id="root"></div>

    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBvG78k-27hBJKkmFP0AW1azxtFNPy8XRQ&libraries=places&loading=async"></script>
    <!-- MSG91 OTP Widget Script -->
    <script>
      window.msg91Config = {
        widgetId: "3666676e5631333434353239",
        tokenAuth: "",
        exposeMethods: true,
        success: (data) => {
          window.dispatchEvent(new CustomEvent('msg91:otp:success', { detail: data }));
        },
        failure: (error) => {
          window.dispatchEvent(new CustomEvent('msg91:otp:failure', { detail: error }));
        }
      };
      (function loadOtpScript(urls) {
        let i = 0;
        function attempt() {
          const s = document.createElement('script');
          s.src = urls[i];
          s.async = true;
          s.onload = () => {
            if (typeof window.initSendOTP === 'function') {
              window.initSendOTP(window.msg91Config);
            }
          };
          s.onerror = () => {
            i++;
            if (i < urls.length) attempt();
          };
          document.head.appendChild(s);
        }
        attempt();
      })(['https://verify.msg91.com/otp-provider.js', 'https://verify.phone91.com/otp-provider.js']);
    </script>
  </body>
